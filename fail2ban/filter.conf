# fail2ban filter for common vulnerability scanners
# Matches requests for URLs that no legitimate user would visit

[Definition]

# Common scanner/exploit paths
failregex = ^<HOST> -.*"(GET|POST|PUT|HEAD|OPTIONS|DELETE|PATCH) /(wp-admin|wp-login|wp-content|wp-includes|wordpress|wp-json/wp)[/ ].* (4\d{2}|3\d{2})
            ^<HOST> -.*"(GET|POST|PUT|HEAD|OPTIONS|DELETE|PATCH) /\.(env|git|svn|htaccess|htpasswd|DS_Store|aws|docker)[/ ]?.* (4\d{2}|3\d{2})
            ^<HOST> -.*"(GET|POST|PUT|HEAD|OPTIONS|DELETE|PATCH) /(phpmyadmin|pma|myadmin|mysql|adminer|dbadmin)[/ ].* (4\d{2}|3\d{2})
            ^<HOST> -.*"(GET|POST|PUT|HEAD|OPTIONS|DELETE|PATCH) /(admin|administrator|manager|panel|dashboard|login\.php|xmlrpc\.php)[/ ]?.* (4\d{2}|3\d{2})
            ^<HOST> -.*"(GET|POST|PUT|HEAD|OPTIONS|DELETE|PATCH) /(cgi-bin|scripts|shell|cmd|command|exec|run)[/ ].* (4\d{2}|3\d{2})
            ^<HOST> -.*"(GET|POST|PUT|HEAD|OPTIONS|DELETE|PATCH) /(config|configuration|setup|install|backup)[/ ].* (4\d{2}|3\d{2})
            ^<HOST> -.*"(GET|POST|PUT|HEAD|OPTIONS|DELETE|PATCH) /(api/v1/|graphql|actuator|solr|console|telescope|debug|_debug)[/ ].* (4\d{2}|3\d{2})
            ^<HOST> -.*"(GET|POST|PUT|HEAD|OPTIONS|DELETE|PATCH) /(vendor|node_modules|composer|storage/logs|laravel)[/ ].* (4\d{2}|3\d{2})
            ^<HOST> -.*"(GET|POST|PUT|HEAD|OPTIONS|DELETE|PATCH) /(server-status|server-info|status\.php|info\.php|phpinfo)[/ ]?.* (4\d{2}|3\d{2})
            ^<HOST> -.*"(GET|POST|PUT|HEAD|OPTIONS|DELETE|PATCH) /(\.well-known/security\.txt) .* 4\d{2}

ignoreregex =

# Notes:
# - Matches common WordPress, PHP, Java, Python, Node.js scanner paths
# - Only triggers on 3xx/4xx responses (not 200) to reduce false positives
# - .well-known/security.txt is optional — remove that line if you serve one
