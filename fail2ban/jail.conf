# fail2ban jail for ephemeris vuln scanner detection
# Place in /etc/fail2ban/jail.d/ephemeris.conf

[ephemeris-scanner]
enabled  = true
filter   = ephemeris-scanner
port     = http,https
logpath  = /var/log/ephemeris/access.log
backend  = auto

# Ban after 3 suspicious requests within 10 minutes
maxretry = 3
findtime = 600

# Ban for 24 hours
bantime  = 86400

# Use the custom Docker-aware action
action   = ephemeris-docker-drop[chain="DOCKER-USER"]
