# fail2ban action using nftables
# Adds/removes IPs from the fail2ban set in the inet firewall table.
# The set uses the timeout flag — entries auto-expire when the ban ends.
# Both input and forward chains reference this set, so banned IPs are
# silently dropped for direct traffic AND Docker-forwarded traffic.
#
# Place in /etc/fail2ban/action.d/ephemeris-nft-drop.conf

[Definition]

actionstart =

actionstop =

# On ban: add IP to the fail2ban set with bantime as the timeout
# nft timeout ensures the entry auto-expires even if fail2ban doesn't unban
actionban = nft add element inet firewall fail2ban { <ip> timeout <bantime>s }

# On unban: remove the IP (may already be gone if timeout expired first)
actionunban = nft delete element inet firewall fail2ban { <ip> } 2>/dev/null || true

[Init]
