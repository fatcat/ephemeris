# fail2ban action that inserts DROP rules into the DOCKER-USER chain
# This intercepts traffic before Docker's NAT/forwarding rules
# Place in /etc/fail2ban/action.d/ephemeris-docker-drop.conf

[Definition]

# Option: chain
#   The iptables chain to insert rules into
chain = DOCKER-USER

actionstart =

actionstop =

# On ban: DROP all traffic from the offending IP in the DOCKER-USER chain
# Also drop in INPUT to silence ICMP and any non-Docker ports
actionban = iptables -I <chain> -s <ip> -j DROP
            iptables -I INPUT -s <ip> -j DROP

# On unban: remove the rules
actionunban = iptables -D <chain> -s <ip> -j DROP
              iptables -D INPUT -s <ip> -j DROP

[Init]
chain = DOCKER-USER
